# ── Production profile ────────────────────────────────────────────────────────
# All sensitive values MUST be supplied via environment variables.
# Never hardcode secrets in this file.
spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 20000

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      lettuce:
        pool:
          max-active: 32
          max-idle: 16

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    validate-on-migrate: true

jwt:
  secret: ${JWT_SECRET}
  access-expiry-ms: ${JWT_ACCESS_EXPIRY_MS}
  refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS}

server:
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    enabled: false  # disable Swagger UI in production

logging:
  level:
    root: WARN
    com.bugeon.fintechledger: INFO
