spring:
  application:
    name: fintech-ledger

  # ── DataSource ───────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:fintech_ledger}
    username: ${POSTGRES_USER:fintech}
    password: ${POSTGRES_PASSWORD:changeme_local}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: FintechHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ── JPA ──────────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema; Hibernate only validates
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: UTC
          batch_size: 50
        order_inserts: true
        order_updates: true

  # ── Flyway ───────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

  # ── Redis ────────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:changeme_local}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms

  # ── Jackson ──────────────────────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: UTC

# ── Server ───────────────────────────────────────────────────────────────────
server:
  port: ${APP_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never
  servlet:
    context-path: /

# ── JWT ──────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}
  access-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}
  refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}

# ── Idempotency ──────────────────────────────────────────────────────────────
idempotency:
  ttl-seconds: ${IDEMPOTENCY_TTL_SECONDS:86400}
  processing-ttl-seconds: ${IDEMPOTENCY_PROCESSING_TTL_SECONDS:30}

# ── Outbox ───────────────────────────────────────────────────────────────────
outbox:
  poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:5000}
  max-retries: ${OUTBOX_MAX_RETRIES:5}

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── OpenAPI / Swagger ────────────────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.bugeon.fintechledger: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-}] %-5level %logger{36} - %msg%n"
