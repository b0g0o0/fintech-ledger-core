spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
      password: ""

jwt:
  secret: test-secret-key-for-tests-only-must-be-at-least-32-characters-long
  access-expiry-ms: 900000
  refresh-expiry-ms: 604800000

idempotency:
  ttl-seconds: 86400
  processing-ttl-seconds: 30

outbox:
  poll-interval-ms: 5000
  max-retries: 5
